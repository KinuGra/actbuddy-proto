host: localhost:8080
info:
  contact: {}
  description: ActBuddy backend API
  title: ActBuddy API
  version: "1.0"
paths:
  /api/v1/action-items:
    get:
      description: 指定ユーザーのアクションアイテム一覧を取得する
      parameters:
      - description: ユーザーUUID
        in: query
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/task.ActionItemResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: アクションアイテム一覧取得
      tags:
      - action-items
    post:
      consumes:
      - application/json
      description: 新しいアクションアイテムを作成する
      parameters:
      - description: アクションアイテム情報
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/task.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              $ref: '#/definitions/task.ActionItemResponse'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: アクションアイテム作成
      tags:
      - action-items
  /api/v1/action-items/{uuid}:
    delete:
      description: UUIDでアクションアイテムを削除する
      parameters:
      - description: アクションアイテムUUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: アクションアイテム削除
      tags:
      - action-items
    get:
      description: UUIDでアクションアイテムを1件取得する
      parameters:
      - description: アクションアイテムUUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/task.ActionItemResponse'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: アクションアイテム取得
      tags:
      - action-items
    put:
      consumes:
      - application/json
      description: UUIDでアクションアイテムを部分更新する
      parameters:
      - description: アクションアイテムUUID
        in: path
        name: uuid
        required: true
        type: string
      - description: 更新内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/task.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/task.ActionItemResponse'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: アクションアイテム更新
      tags:
      - action-items
  /health:
    get:
      description: サーバーの死活確認
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: ヘルスチェック
      tags:
      - system
